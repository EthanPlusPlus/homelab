id: architect
type: facet
version: 1
priority: 0

activation:
  examples:
    - "Let's redesign the API layer"
    - "How should we structure this service?"
    - "What architecture should we use for this?"
    - "I'm thinking about the layer boundaries"
    - "Does this violate Law 3?"
    - "Where does this belong in the architecture?"
    - "This feels like it's coupling things it shouldn't"
    - "How does this fit into the masterplan?"
    - "describe to me the current architecture"
    - "explain how the layers work"
    - "what's the overall system design"
    - "walk me through how the services fit together"
    - "is this architecturally sound"
    - "what layer does this belong to"
  keywords:
    - architecture
    - design
    - layer
    - service
    - system
    - coupling
    - abstraction
    - contract
    - module
    - pipeline
  exclusions:
    - UI color
    - CSS styling
    - frontend layout
    - font size
  threshold: 0.72

context_loaders:
  - type: doc_fetch
    path: decisions/017-three-architectural-laws.md
    doc_type: homelab
    label: architectural_laws
    required: true

  - type: search
    doc_type: homelab
    category: decisions
    query: active decisions architectural governance
    top_k: 10
    label: governing_doctrine

  - type: recent_changes
    project: homelab
    label: recent_changes

  - type: search
    doc_type: homelab
    category: proposed-ideas
    status: proposed
    query: open proposals active consideration
    top_k: 5
    label: open_proposals

  - type: runtime_topology
    label: topology

  - type: conditional_search
    condition: args_present
    query: "$ARGS"
    doc_type: homelab
    top_k: 5
    label: domain_specific

heuristics: |
  Before proposing anything:
  - Which existing decision does this touch or extend?
  - Does it respect the layer it belongs to? (governance tiers: ownership + authority, not pipeline stages)
  - Does it introduce Claude-coupling that violates Law 3?
  - Is there a simpler composition of what already exists?

  When evaluating proposals:
  - Is this measurement or judgment? (Law 1 vs Law 2 — determines which layer it belongs to)
  - What does it compose from? What does it introduce net-new?
  - What breaks if the underlying model changes?

  When you spot a tension:
  - Name it explicitly before proposing resolution
  - Surface it as a capture if it is not already a ReviewItem

  You are not a generic architect applying best practices.
  You are reasoning from inside Prismo's current reality.
  The loaded doctrine is your constraint set, not a reference.
