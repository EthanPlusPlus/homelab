id: migrate
type: sequence
version: 2
priority: 0

activation:
  examples:
    - "let's migrate the database schema"
    - "I need to rename this function across the codebase"
    - "we're upgrading the API, there's a breaking change"
    - "how do I roll this back if it fails"
    - "what call sites do I need to update"
    - "I want to deprecate this endpoint"
    - "upgrading from ChromaDB to pgvector"
    - "changing the interface contract"
    - "this migration needs a rollback plan"
    - "schema change affecting multiple services"
  keywords:
    - migrate
    - migration
    - upgrade
    - deprecate
    - rename
    - breaking
    - rollback
    - call site
    - schema
    - refactor
  exclusions:
    - CSS migration
    - design migration
    - color scheme
  threshold: 0.75

context_loaders:
  - type: doc_fetch
    path: decisions/017-three-architectural-laws.md
    doc_type: prismo
    label: architectural_laws
    required: true

  - type: search
    doc_type: prismo
    category: decisions
    query: migration interface contract service rule breaking change
    top_k: 8
    label: migration_doctrine

  - type: recent_changes
    project: prismo
    label: recent_changes

  - type: runtime_topology
    label: topology

  - type: conditional_search
    condition: args_present
    query: "$ARGS"
    doc_type: prismo
    top_k: 5
    label: domain_specific

steps:
  - id: grep_call_sites
    label: "Grep all call sites before touching anything"
    detail: "Run grep -rn '<symbol_or_route>' ~/projects/ to find every caller. Do not proceed until you have the full list. Missed call sites are how the pgvector/doctrine bug happened (2026-05-29)."
    required: true

  - id: service_rule_baseline
    label: "Capture Service Rule baseline"
    detail: "GET http://localhost:8000/doctrine/validate or check startup logs. Record current violation count. Any new violations after migration = regression."
    required: true

  - id: capability_contracts_check
    label: "Check capability-contracts.md before any route changes"
    detail: "If adding/removing/changing a route: update architecture/contracts/capability-contracts.md FIRST. The Service Rule check fails-to-start on undocumented routes — discover this at planning time, not deploy time."

  - id: rollback_plan
    label: "Write the rollback plan"
    detail: "Name the specific revert: which migration to undo, which git SHA to reset to, whether data written during migration can be undone. If data cannot be undone, this is a one-way door — say so explicitly before proceeding."
    required: true

  - id: one_change_at_a_time
    label: "Change one thing at a time"
    detail: "Do not bundle interface changes with logic changes. Keep backward compat until ALL call sites are updated. If changing a function signature: update callers before changing the implementation, or vice versa — never leave them inconsistent."

  - id: post_migration_service_rule
    label: "Run Service Rule check after every route change"
    detail: "GET /doctrine/validate. Zero new violations. If violations appear: fix before moving on. Do not accumulate violations across steps."
    required: true

  - id: smoke_test
    label: "Smoke test every changed route"
    detail: "Hit each changed endpoint with a real request. Verify response shape matches capability-contracts.md. Check docker compose logs for errors."
    required: true

  - id: update_canon
    label: "Update component canon"
    detail: "Update recent-changes.md with what changed. Update progress.md if a phase item closed. Check for stale cross-references in decisions that named the old interface."
