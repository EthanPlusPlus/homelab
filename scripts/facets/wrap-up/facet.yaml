id: wrap-up
type: sequence
version: 2
priority: 10

activation:
  examples:
    - "okay that's it for today"
    - "wrap up"
    - "let's wrap up"
    - "we're done for now"
    - "I think we're done"
    - "ending the session"
    - "session end"
    - "closing out"
    - "that's all for now"
    - "I'm done for now"
    - "let's call it here"
    - "okay I'm done"
    - "bye"
    - "make it canon then we're done"
  keywords:
    - wrap
    - done
    - bye
    - closing
    - ending
    - finish
    - session end
  threshold: 0.68

context_loaders:
  - type: stale_items
    project: prismo
    label: stale_items

  - type: review_queue
    status: pending
    label: pending_review

  - type: recent_changes
    project: prismo
    label: recent_changes

steps:
  - id: check_git
    label: "Check git status across canon repos"
    detail: "Run git -C ~/canon/prismo status --short and git -C ~/projects/context-server status --short. If uncommitted changes exist, surface them and offer to commit + push before closing."
    required: true

  - id: update_recent_changes
    label: "Update recent-changes.md if needed"
    detail: "Was meaningful work done this session not yet in ~/canon/prismo/docs/context/recent-changes.md? If yes, update before closing. Keep to 1-3 lines."

  - id: surface_stale
    label: "Surface stale items"
    detail: "If there are unacknowledged stale items (loaded above), mention them briefly. Do not force action — just surface so they're aware."

  - id: surface_reviews
    label: "Report pending ReviewItems"
    detail: "If there are pending items in the review queue (loaded above), mention the count."

  - id: session_end
    label: "End the session"
    detail: "Run prismo session end to write the summary and close the workflow session. Always the final step."
    required: true
