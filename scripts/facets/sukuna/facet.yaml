id: sukuna
type: sequence
version: 2
priority: 0

activation:
  examples:
    - "run a sukuna pass"
    - "do a consistency check on the canon"
    - "check for stale items in the documentation"
    - "audit the canon for drift"
    - "what's inconsistent across the docs"
    - "review the proposed-ideas for stale ones"
    - "find contradictions between decisions"
    - "do a canon maintenance pass"
    - "what needs to be cleaned up in the docs"
    - "check for terminology drift"
  keywords:
    - sukuna
    - canon
    - consistency
    - audit
    - stale
    - drift
    - maintenance
    - contradiction
  shortcut_keywords:
    - sukuna
  exclusions: []
  threshold: 0.72

context_loaders:
  - type: recent_changes
    project: prismo
    label: recent_changes

  - type: search
    doc_type: prismo
    category: decisions
    query: active decisions governing doctrine architectural laws
    top_k: 10
    label: active_doctrine

  - type: search
    doc_type: prismo
    category: proposed-ideas
    status: proposed
    query: open proposals active consideration
    top_k: 8
    label: open_proposals

  - type: stale_items
    project: prismo
    label: stale_items

  - type: review_queue
    project: prismo
    status: pending
    limit: 10
    label: pending_reviews

  - type: runtime_topology
    label: topology

steps:
  - id: consistency
    label: "Consistency pass"
    detail: "Scan loaded context for: terminology drift (casing, service names, concept labels), stale cross-references (links to decisions or files that no longer exist), formatting divergence (frontmatter missing, header styles), status mismatches (proposed-ideas annotated as superseded but not marked so)."

  - id: observations
    label: "Observations pass"
    detail: "Surface patterns and gaps: proposed-ideas whose purpose is already answered by a decision, decisions referencing concepts never formally defined, canon contradicting a more recent decision without annotation, component canon stale relative to prismo canon."

  - id: thinking
    label: "Thinking pass"
    detail: "No constraints. Challenge existing decisions. Surface tensions that have no ReviewItem. Propose what should be thrown out. Name the most important unconsidered question."

  - id: emit_captures
    label: "Emit captures for each finding"
    detail: "For each finding from the three passes: prismo capture \"<finding>\". Do not write to drafts/. Do not modify canon directly. Captures flow through synthesis → ReviewItems → human review."
    required: true
